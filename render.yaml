services:
  # ── Backend: Node.js / Express API ────────────────────────────────────────
  - type: web
    name: sales-tracking-api
    env: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /tmp/sales-tracking.db
      # Populated automatically from the static site's hostname once Render
      # resolves both services. The backend normalises the value to a full URL.
      - key: CORS_ORIGIN
        fromService:
          name: sales-tracking-frontend
          type: web
          property: host

  # ── Frontend: Angular SPA served via Render Static Sites ──────────────────
  - type: web
    name: sales-tracking-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/sales-tracking-frontend/browser
    # SPA fallback: all unknown paths serve index.html so Angular Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Full backend URL — set this manually in the Render dashboard after
      # the first deploy so the Angular bundle gets the correct API endpoint.
      # Example: https://sales-tracking-api-xxxx.onrender.com
      - key: NG_API_URL
        sync: false
      # Fallback: populated automatically from the backend hostname (no https://).
      # set-env.js adds the protocol. Used if NG_API_URL is not set.
      - key: NG_API_HOST
        fromService:
          name: sales-tracking-api
          type: web
          property: host
