server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para reducir el tamaño de los assets en tránsito
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;

    # Cache agresiva para assets estáticos. Angular genera nombres con hash
    # único por build, por lo que todos los js/css/fonts son inmutables.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Angular client-side routing: cualquier ruta no encontrada como archivo
    # estático se redirige a index.html para que el router de Angular la maneje.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
