<mat-card>
  <mat-card-header>
    <mat-icon mat-card-avatar class="avatar-icon">history</mat-icon>
    <mat-card-title>Sales History</mat-card-title>
    <mat-card-subtitle>{{ sales().length }} record(s) total</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="table-content">
    @if (loading()) {
      <div class="center">
        <mat-spinner diameter="40" />
      </div>
    } @else if (sales().length === 0) {
      <div class="empty-state">
        <mat-icon>receipt_long</mat-icon>
        <p>No sales registered yet.</p>
      </div>
    } @else {
      <table mat-table [dataSource]="sales()" class="sales-table">

        <ng-container matColumnDef="saleDate">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let s">{{ s.saleDate | date:'mediumDate' }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let s" class="desc-cell">{{ s.description }}</td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef class="amount-header">Amount</th>
          <td mat-cell *matCellDef="let s" class="amount-cell">
            ${{ s.amount | number:'1.2-2' }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
